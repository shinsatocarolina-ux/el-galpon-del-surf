
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Galpón del Surf</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root {
            --color-ocean-dark: #0B2545;
            --color-ocean-medium: #134074;
            --color-ocean-light: #8DA9C4;
            --color-ocean-bg: #EEF4F8;
            --color-sand: #EEF4F8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-ocean-bg);
            color: var(--color-ocean-dark);
        }

        .bg-ocean-dark { background-color: var(--color-ocean-dark); }
        .text-ocean-dark { color: var(--color-ocean-dark); }
        .bg-ocean-medium { background-color: var(--color-ocean-medium); }
        .text-ocean-light { color: var(--color-ocean-light); }
        .bg-sand { background-color: var(--color-sand); }

        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(11, 37, 69, 0.5);
            z-index: -1;
        }

        .product-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px) rotate(0.5deg);
            box-shadow: 0 10px 20px rgba(11, 37, 69, 0.15);
        }

        .cart-sidebar {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-primary {
            background-color: var(--color-ocean-dark);
            color: #fff;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: var(--color-ocean-medium);
            transform: scale(1.02);
        }
    </style>
</head>
<body class="relative min-h-screen pb-20">

    <!-- Fondo de Video y Overlay -->
    <video class="video-container" autoplay loop muted playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-surfer-riding-a-wave-under-a-beautiful-sunset-41604-large.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <!-- Header / Navbar -->
    <header class="bg-ocean-dark text-white p-4 sticky top-0 z-40 shadow-md backdrop-blur-md bg-opacity-90">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-wider text-white">EL GALPÓN DEL SURF</h1>
            <button id="cartBtn" class="relative bg-white text-ocean-dark font-bold px-4 py-2 rounded-full shadow hover:bg-opacity-90 transition flex items-center gap-2">
                🛒 Carrito
                <span id="cartCount" class="bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">0</span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <!-- Sección Tablas de Surf -->
        <section id="boards-section" class="mb-16 reveal">
            <h2 class="text-3xl font-bold mb-6 text-white border-b-2 border-white pb-2 inline-block">Tablas de Surf</h2>
            <div id="boards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Render dinámico aquí -->
            </div>
        </section>

        <!-- Sección Accesorios -->
        <section id="accessories-section" class="reveal">
            <h2 class="text-3xl font-bold mb-6 text-white border-b-2 border-white pb-2 inline-block">Accesorios esenciales</h2>
            <div id="accessories-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Render dinámico aquí -->
            </div>
        </section>
    </main>

    <!-- Sidebar del Carrito (Optimizado para móviles con p-4 md:p-6) -->
    <aside id="cartSidebar" class="cart-sidebar fixed top-0 right-0 h-full w-[400px] max-w-full bg-white shadow-2xl z-50 transform translate-x-full flex flex-col p-4 md:p-6 text-ocean-dark">
        <div class="flex justify-between items-center border-b pb-4 mb-4">
            <h3 class="text-xl font-bold">Tu Pedido</h3>
            <button id="closeCartBtn" class="text-2xl font-bold hover:text-red-500 transition">&times;</button>
        </div>
        <div id="cartItems" class="flex-1 overflow-y-auto space-y-4">
            <!-- Items del carrito -->
        </div>
        <div class="border-t pt-4 mt-4 space-y-4">
            <div class="flex justify-between text-lg font-bold">
                <span>Total:</span>
                <span id="cartTotal">$0</span>
            </div>
            <button class="w-full btn-primary py-3 rounded-xl font-bold shadow-lg">Iniciar Compra</button>
        </div>
    </aside>

    <!-- Modal de Detalles (Optimizado con aria-label) -->
    <div id="productModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 p-4">
        <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto relative p-6 flex flex-col md:flex-row gap-6 shadow-2xl">
            <!-- Botón de cierre con accesibilidad para lectores de pantalla -->
            <button id="closeModalBtn" aria-label="Cerrar modal" class="absolute top-4 right-4 text-3xl font-bold text-gray-500 hover:text-black transition z-10">&times;</button>
            <div class="w-full md:w-1/2">
                <img id="modalImg" src="" alt="" class="w-full h-64 object-cover rounded-xl shadow-inner">
            </div>
            <div class="w-full md:w-1/2 flex flex-col justify-between">
                <div>
                    <h3 id="modalTitle" class="text-2xl font-bold mb-2 text-ocean-dark"></h3>
                    <p id="modalPrice" class="text-xl font-black text-ocean-medium mb-4"></p>
                    <p id="modalDescription" class="text-gray-600 text-sm leading-relaxed mb-6"></p>
                </div>
                <div id="modalActionContainer">
                    <!-- Botón dinámico generado según el contexto -->
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // Datos de productos (Actualizados y unificados)
        const boards = [
            { id: 1, name: "Fish Retro 5'8", price: 450000, img: "https://images.unsplash.com/photo-1531722569936-825d3dd91b15?w=500&auto=format&fit=crop&q=60", desc: "Ideal para olas chicas y medianas. Perfecta flotabilidad, cantos clásicos y un diseño twin fin que garantiza velocidad y giros fluidos en la pared de la ola." },
            { id: 2, name: "Shortboard Performance 6'1", price: 480000, img: "https://images.unsplash.com/photo-1502680390469-be75c86b636f?w=500&auto=format&fit=crop&q=60", desc: "Diseñada para surfistas intermedios y avanzados. Rocker pronunciado para maniobras críticas en olas rápidas y potentes." },
            { id: 3, name: "Longboard Classic 9'2", price: 620000, img: "https://images.unsplash.com/photo-1473186578172-c141e6798cf4?w=500&auto=format&fit=crop&q=60", desc: "Estilo puro de la vieja escuela. Excelente para noseriding, caminatas estables y sesiones relajadas en días de olas suaves." }
        ];

        const accessories = [
            { id: 101, name: "Leash Comp 6ft", price: 28000, img: "https://images.unsplash.com/photo-1596838132731-3301c3fd4317?w=500&auto=format&fit=crop&q=60", desc: "Cuerda de uretano de alta resistencia de 7mm. Doble quitavueltas de acero inoxidable para evitar enredos molestos." },
            { id: 102, name: "Grip de Tracción", price: 35000, img: "https://images.unsplash.com/photo-1565992441121-4367c2967103?w=500&auto=format&fit=crop&q=60", desc: "Grip de EVA ultraligero con arco central de 5mm y kicktail de 30mm. Adhesivo 3M garantizado de por vida." },
            { id: 103, name: "Parafina Cold Water", price: 4500, img: "https://images.unsplash.com/photo-1509198397868-475647b2a1e5?w=500&auto=format&fit=crop&q=60", desc: "Fórmula orgánica premium para aguas frías (10-15°C). Agarre óptimo de larga duración sin desprenderse." },
            { id: 104, name: "Funda Protectora 6'3", price: 75000, img: "https://images.unsplash.com/photo-1542628682-88362445e783?w=500&auto=format&fit=crop&q=60", desc: "Acolchado de alta densidad de 5mm con lona reflectante de calor. Protección total contra golpes cotidianos y rayos UV." }
        ];

        let cart = [];

        // Inicialización y Renderizado
        document.addEventListener("DOMContentLoaded", () => {
            renderProducts();
            setupEventListeners();
            setupScrollReveal();
        });

        // Modificado para limpiar la propagación del click usando event.stopPropagation() explícito inline
        function renderProducts() {
            const boardsContainer = document.getElementById("boards-container");
            boardsContainer.innerHTML = boards.map(b => `
                <div class="bg-white rounded-2xl overflow-hidden product-card shadow-md cursor-pointer relative" onclick="openModal(${b.id}, 'board')">
                    <img src="${b.img}" alt="${b.name}" class="w-full h-56 object-cover">
                    <div class="p-5">
                        <h3 class="text-xl font-bold mb-2 text-ocean-dark">${b.name}</h3>
                        <p class="text-gray-600 text-sm mb-4 line-clamp-2">${b.desc}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-lg font-black text-ocean-medium">$${b.price.toLocaleString('es-AR')}</span>
                            <button onclick="event.stopPropagation(); addToCart(${b.id}, 'board')" class="btn-primary py-1 px-3 text-sm relative z-10 rounded-lg font-semibold shadow">Agregar</button>
                        </div>
                    </div>
                </div>
            `).join('');

            const accContainer = document.getElementById("accessories-container");
            accContainer.innerHTML = accessories.map(a => `
                <div class="bg-white rounded-2xl overflow-hidden product-card shadow-md cursor-pointer relative" onclick="openModal(${a.id}, 'accessory')">
                    <img src="${a.img}" alt="${a.name}" class="w-full h-40 object-cover">
                    <div class="p-4">
                        <h3 class="font-bold text-base mb-1 text-ocean-dark truncate">${a.name}</h3>
                        <div class="flex justify-between items-center mt-3">
                            <span class="text-base font-black text-ocean-medium">$${a.price.toLocaleString('es-AR')}</span>
                            <button onclick="event.stopPropagation(); addToCart(${a.id}, 'accessory')" class="btn-primary py-1 px-2.5 text-xs relative z-10 rounded-md font-semibold shadow">Agregar</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Eventos Globales de Interfaz
        function setupEventListeners() {
            const cartBtn = document.getElementById("cartBtn");
            const closeCartBtn = document.getElementById("closeCartBtn");
            const cartSidebar = document.getElementById("cartSidebar");
            const productModal = document.getElementById("productModal");
            const closeModalBtn = document.getElementById("closeModalBtn");

            cartBtn.addEventListener("click", () => cartSidebar.classList.remove("translate-x-full"));
            closeCartBtn.addEventListener("click", () => cartSidebar.classList.add("translate-x-full"));
            
            closeModalBtn.addEventListener("click", closeModal);
            productModal.addEventListener("click", (e) => {
                if(e.target === productModal) closeModal();
            });
        }

        // Lógica de Scroll con Intersection Observer
        function setupScrollReveal() {
            const observers = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if(entry.isIntersecting) {
                        entry.target.classList.add("active");
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll(".reveal").forEach(el => observers.observe(el));
        }

        // Gestión de Ventana Modal
        function openModal(id, type) {
            const product = type === 'board' ? boards.find(b => b.id === id) : accessories.find(a => a.id === id);
            if(!product) return;

            document.getElementById("modalImg").src = product.img;
            document.getElementById("modalImg").alt = product.name;
            document.getElementById("modalTitle").innerText = product.name;
            document.getElementById("modalPrice").innerText = `$${product.price.toLocaleString('es-AR')}`;
            document.getElementById("modalDescription").innerText = product.desc;

            // Inserción limpia del botón de acción en el modal
            document.getElementById("modalActionContainer").innerHTML = `
                <button onclick="addToCart(${product.id}, '${type}'); closeModal();" class="w-full btn-primary py-3 rounded-xl font-bold shadow-md">
                    Añadir al Carrito
                </button>
            `;

            const modal = document.getElementById("productModal");
            modal.classList.remove("opacity-0", "pointer-events-none");
        }

        function closeModal() {
            const modal = document.getElementById("productModal");
            modal.classList.add("opacity-0", "pointer-events-none");
        }

        // Lógica del Carrito de Compras
        function addToCart(id, type) {
            const list = type === 'board' ? boards : accessories;
            const item = list.find(p => p.id === id);
            
            const existing = cart.find(c => c.id === id);
            if(existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...item, quantity: 1 });
            }
            updateCartUI();
        }

        function changeQuantity(id, amount) {
            const item = cart.find(c => c.id === id);
            if(!item) return;

            item.quantity += amount;
            if(item.quantity <= 0) {
                cart = cart.filter(c => c.id !== id);
            }
            updateCartUI();
        }

        function updateCartUI() {
            const cartItems = document.getElementById("cartItems");
            const cartCount = document.getElementById("cartCount");
            const cartTotal = document.getElementById("cartTotal");

            const totalCount = cart.reduce((acc, current) => acc + current.quantity, 0);
            const totalPrice = cart.reduce((acc, current) => acc + (current.price * current.quantity), 0);

            cartCount.innerText = totalCount;
            cartTotal.innerText = `$${totalPrice.toLocaleString('es-AR')}`;

            if(cart.length === 0) {
                cartItems.innerHTML = `<p class="text-gray-400 text-center py-8">Tu carrito está vacío.</p>`;
                return;
            }

            cartItems.innerHTML = cart.map(c => `
                <div class="flex items-center gap-4 bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <img src="${c.img}" alt="${c.name}" class="w-16 h-16 object-cover rounded-lg">
                    <div class="flex-1 min-w-0">
                        <h4 class="font-bold text-sm truncate">${c.name}</h4>
                        <p class="text-xs text-gray-500 font-semibold mt-0.5">$${c.price.toLocaleString('es-AR')}</p>
                    </div>
                    <div class="flex items-center gap-2 bg-white border rounded-lg px-2 py-1">
                        <button onclick="changeQuantity(${c.id}, -1)" class="font-bold text-gray-500 hover:text-black px-1">-</button>
                        <span class="text-sm font-bold w-4 text-center">${c.quantity}</span>
                        <button onclick="changeQuantity(${c.id}, 1)" class="font-bold text-gray-500 hover:text-black px-1">+</button>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>

```
