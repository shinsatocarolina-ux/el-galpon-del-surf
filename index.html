<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Galpón del Surf</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a1628;
            --bg-medium: #122a4a;
            --ocean-deep: #0066b3;
            --ocean-light: #00b4d8;
            --foam: #e8f4f8;
            --sand: #f4a261;
            --teal: #2a9d8f;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--foam); overflow-x: hidden; }
        .font-display { font-family: 'Bebas Neue', sans-serif; }
        .wave-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .wave { position: absolute; width: 200%; height: 200%; background: radial-gradient(ellipse at center, var(--ocean-deep) 0%, transparent 70%); opacity: 0.3; animation: waveFloat 20s ease-in-out infinite; }
        @keyframes waveFloat { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(0, 4%) rotate(0deg); } }
        .nav-blur { background: rgba(10, 22, 40, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0, 180, 216, 0.2); }
        .product-card { background: linear-gradient(145deg, rgba(18, 42, 74, 0.8), rgba(10, 22, 40, 0.9)); border: 1px solid rgba(0, 180, 216, 0.15); transition: all 0.3s ease; position: relative; }
        .product-card:hover { transform: translateY(-5px); border-color: var(--ocean-light); }
        .btn-primary { background: linear-gradient(135deg, var(--ocean-light), var(--teal)); color: var(--bg-dark); font-weight: 600; padding: 10px 20px; border-radius: 4px; transition: all 0.3s ease; }
        .btn-whatsapp { background: #25D366; color: white; font-weight: 600; padding: 14px 32px; border-radius: 4px; display: inline-flex; align-items: center; gap: 8px; }
        
        /* Estilos de las imágenes de las tablas (frente/espalda) */
        .image-container { position: relative; overflow: hidden; height: 280px; border-radius: 12px; }
        .img-back { position: absolute; top: 0; left: 0; opacity: 0; transition: opacity 0.4s ease; }
        .image-container:hover .img-back { opacity: 1; }
    </style>
</head>
<body>
    <div class="wave-bg"><div class="wave"></div></div>

    <!-- Navegación -->
    <nav class="nav-blur fixed top-0 left-0 right-0 z-40">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <span onclick="triggerAdmin()" class="font-display text-2xl tracking-wider text-[#00b4d8] cursor-pointer select-none">EL GALPÓN DEL SURF</span>
            <div class="flex gap-6">
                <a href="#tablas" class="text-sm uppercase tracking-widest">Tablas</a>
                <a href="#trajes" class="text-sm uppercase tracking-widest">Trajes</a>
                <a href="#accesorios" class="text-sm uppercase tracking-widest">Accesorios</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="min-h-screen flex items-center pt-16">
        <div class="max-w-7xl mx-auto px-4 grid lg:grid-cols-2 gap-12 items-center w-full">
            <div>
                <h1 class="font-display text-6xl lg:text-8xl mb-6 text-white">EL GALPÓN DEL SURF</h1>
                <p class="text-xl text-slate-300 mb-8">Catálogo privado y exclusivo para surfistas. Mirá los modelos disponibles de frente y espalda pasando el mouse por encima de la foto.</p>
                <a href="https://wa.me/5492257525899" target="_blank" class="btn-whatsapp">Escribime por WhatsApp</a>
            </div>
        </div>
    </section>

    <!-- Catálogo de Tablas -->
    <section id="tablas" class="py-20 px-4 max-w-7xl mx-auto">
        <h2 class="font-display text-4xl mb-12 border-b border-cyan-500/30 pb-2">TABLAS DE SURF</h2>
        <div id="boardsGrid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Las tablas se cargan solas acá -->
        </div>
    </section>

    <!-- Catálogo de Trajes -->
    <section id="trajes" class="py-20 px-4 max-w-7xl mx-auto">
        <h2 class="font-display text-4xl mb-12 border-b border-cyan-500/30 pb-2">TRAJES DE NEOPRENE</h2>
        <div id="wetsuitsGrid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </section>

    <!-- Catálogo de Accesorios -->
    <section id="accesorios" class="py-20 px-4 max-w-7xl mx-auto">
        <h2 class="font-display text-4xl mb-12 border-b border-cyan-500/30 pb-2">ACCESORIOS</h2>
        <div id="accessoriesGrid" class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </section>

    <!-- PANEL DE ADMINISTRACIÓN OCULTO -->
    <div id="adminModal" class="fixed inset-0 bg-black/80 backdrop-filter blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-[#122a4a] p-6 rounded-2xl max-w-lg w-full border border-cyan-500/40 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-display text-2xl text-cyan-400">Panel Interno de Carga</h3>
                <button onclick="closeAdmin()" class="text-white text-xl">&times;</button>
            </div>
            <form id="productForm" class="space-y-4 text-slate-900">
                <div>
                    <label class="block text-white text-sm mb-1">Categoría</label>
                    <select id="pCategory" class="w-full p-2 rounded bg-slate-100">
                        <option value="tabla">Tabla de Surf</option>
                        <option value="traje">Traje de Neoprene</option>
                        <option value="accesorio">Accesorio</option>
                    </select>
                </div>
                <div>
                    <label class="block text-white text-sm mb-1">Nombre del Producto</label>
                    <input type="text" id="pName" required class="w-full p-2 rounded bg-slate-100">
                </div>
                <div>
                    <label class="block text-white text-sm mb-1">Precio (en USD o $)</label>
                    <input type="number" id="pPrice" required class="w-full p-2 rounded bg-slate-100">
                </div>
                <div>
                    <label class="block text-white text-sm mb-1">Descripción corta</label>
                    <input type="text" id="pDesc" class="w-full p-2 rounded bg-slate-100">
                </div>
                <div>
                    <label class="block text-white text-sm mb-1">Link de Foto de FRENTE</label>
                    <input type="url" id="pImgFront" placeholder="https://..." class="w-full p-2 rounded bg-slate-100">
                </div>
                <div>
                    <label class="block text-white text-sm mb-1">Link de Foto de ESPALDA (Opcional)</label>
                    <input type="url" id="pImgBack" placeholder="https://..." class="w-full p-2 rounded bg-slate-100">
                </div>
                <button type="submit" class="w-full btn-primary mt-4 py-3 text-slate-900 font-bold">Publicar Producto</button>
            </form>
        </div>
    </div>

    <script>
        // CONTRASEÑA PRIVADA
        const SEV_PASS = "Galpon2026"; 

        // Base de datos local (se guarda en tu navegador)
        let localProducts = JSON.parse(localStorage.getItem('galpon_products')) || [
            { id: 1, category: "tabla", name: "Tabla Evolutiva 7'0", price: 350, desc: "Ideal para iniciar.", front: "https://images.unsplash.com/photo-1502680390469-be75c86b636f?w=500", back: "https://images.unsplash.com/photo-1531722569936-825d3dd91b15?w=500" }
        ];

        let clickCount = 0;

        function renderAll() {
            const bGrid = document.getElementById('boardsGrid');
            const wGrid = document.getElementById('wetsuitsGrid');
            const aGrid = document.getElementById('accessoriesGrid');
            
            bGrid.innerHTML = ""; wGrid.innerHTML = ""; aGrid.innerHTML = "";

            localProducts.forEach(p => {
                const card = document.createElement('div');
                card.className = "product-card rounded-2xl p-4";
                
                // Si hay foto de espalda, activa el efecto al pasar el mouse
                let imgHTML = `<div class="image-container mb-4">
                    <img src="${p.front}" class="w-full h-full object-cover rounded-xl img-front" alt="${p.name}">`;
                if(p.back) {
                    imgHTML += `<img src="${p.back}" class="w-full h-full object-cover rounded-xl img-back" alt="${p.name}">`;
                }
                imgHTML += `</div>`;

                card.innerHTML = `
                    ${p.front ? imgHTML : ''}
                    <h3 class="font-display text-xl mb-1">${p.name}</h3>
                    <p class="text-sm opacity-75 mb-3">${p.desc || ''}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-[#f4a261] font-display text-2xl">$${p.price}</span>
                        <a href="https://wa.me/5492257525899?text=Hola!%20Me%20interesa%20el%20producto:%20${encodeURIComponent(p.name)}" target="_blank" class="bg-cyan-600 px-3 py-1 text-sm rounded font-medium text-white">Consultar</a>
                    </div>
                `;

                if(p.category === 'tabla') bGrid.appendChild(card);
                if(p.category === 'traje') wGrid.appendChild(card);
                if(p.category === 'accesorio') aGrid.appendChild(card);
            });
        }

        // Activadores del panel oculto
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'm') loginAdmin();
        });

        function triggerAdmin() {
            clickCount++;
            if (clickCount >= 3) {
                clickCount = 0;
                loginAdmin();
            }
        }

        function loginAdmin() {
            const pass = prompt("Ingresá la contraseña privada de El Galpón del Surf:");
            if (pass === SEV_PASS) {
                document.getElementById('adminModal').classList.remove('hidden');
            } else if (pass !== null) {
                alert("Contraseña incorrecta.");
            }
        }

        function closeAdmin() { document.getElementById('adminModal').classList.add('hidden'); }

        document.getElementById('productForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const newP = {
                id: Date.now(),
                category: document.getElementById('pCategory').value,
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                desc: document.getElementById('pDesc').value,
                front: document.getElementById('pImgFront').value,
                back: document.getElementById('pImgBack').value
            };
            localProducts.push(newP);
            localStorage.setItem('galpon_products', JSON.stringify(localProducts));
            renderAll();
            closeAdmin();
            document.getElementById('productForm').reset();
        });

        document.addEventListener('DOMContentLoaded', renderAll);
    </script>
</body>
</html>
